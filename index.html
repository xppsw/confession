<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<link rel="dns-prefetch" href="https://pub-062cd22d0ea64348a193ad666086c28f.r2.dev">
<link rel="preconnect" href="https://pub-062cd22d0ea64348a193ad666086c28f.r2.dev">
<meta name="color-scheme" content="light dark">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>一封信</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html { color-scheme: light dark; }

  body {
    font-family: "Noto Serif SC", "Source Han Serif SC", "STSong", "SimSun", serif;
    background: #f5f1e8;
    color: #3a3632;
    min-height: 100vh;
    transition: background 1.2s ease, color 1.2s ease;
    user-select: none; -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
    overflow-x: hidden;
  }

  /* ===== 章节容器 ===== */
  #chapter-view {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 48px 20px 100px;
    transition: opacity 0.6s ease, transform 0.6s ease;
    opacity: 1;
    position: relative; z-index: 1;
  }
  #chapter-view.fade-out { opacity: 0; transform: translateY(12px); }

  #chapter-inner {
    max-width: 680px; width: 100%;
    display: flex; flex-direction: column; gap: 20px;
    border-left: 1px solid var(--border-color, rgba(0,0,0,0.06));
    border-right: 1px solid var(--border-color, rgba(0,0,0,0.06));
    padding: 0 48px;
  }

  @media (min-width: 900px) {
    body { zoom: 1.38; }
  }

  /* ===== 首次交互遮罩 ===== */
  #play-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.55); backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: opacity 0.6s ease;
  }
  #play-overlay.hidden { opacity: 0; pointer-events: none; }
  #play-overlay .play-hint {
    text-align: center; color: rgba(255,255,255,0.75);
    font-size: 15px; letter-spacing: 4px;
    animation: hintPulse 2.5s ease-in-out infinite;
    font-family: inherit;
  }
  @keyframes hintPulse {
    0%,100% { opacity: 0.4; }
    50% { opacity: 0.85; }
  }

  /* ===== 密码门 ===== */
  #password-gate {
    position: fixed; inset: 0; z-index: 150;
    background: rgba(20,16,12,0.92); backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 24px;
    opacity: 1; visibility: visible;
    transition: opacity 0.6s ease, visibility 0.6s ease;
  }
  #password-gate.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
  #password-gate .gate-close {
    position: fixed; top: 20px; right: 24px; z-index: 151;
    background: none; border: none;
    color: rgba(200,180,150,0.5); font-size: 22px;
    cursor: pointer; font-family: inherit;
    transition: color 0.3s; padding: 4px 8px;
  }
  #password-gate .gate-close:hover { color: rgba(200,180,150,0.85); }
  #password-gate .gate-icon { animation: float 3s ease-in-out infinite; }
  #password-gate .gate-icon svg { width: 48px; height: 48px; }
  @keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  #password-gate .gate-title {
    font-size: 18px; letter-spacing: 6px; color: #c8b898; font-weight: 400;
  }
  .gate-input {
    width: 180px; padding: 10px 0;
    background: transparent;
    border: none;
    border-bottom: 2px solid rgba(200,180,150,0.35);
    border-radius: 0;
    color: #d4c8b8; font-size: 20px; font-family: inherit;
    text-align: center; letter-spacing: 8px;
    outline: none; transition: border-color 0.3s;
  }
  .gate-input::placeholder { color: rgba(200,180,150,0.25); letter-spacing: 2px; }
  .gate-input:focus { border-bottom-color: rgba(200,180,150,0.7); }
  #password-gate .gate-hint {
    font-size: 13px; color: rgba(200,180,150,0.45);
    letter-spacing: 2px; max-width: 280px; text-align: center;
  }
  #password-gate .gate-error {
    font-size: 13px; color: rgba(220,140,130,0.8);
    min-height: 20px; transition: opacity 0.3s; opacity: 0;
  }
  #password-gate .gate-submit {
    background: rgba(200,180,150,0.08); border: 1px solid rgba(200,180,150,0.2);
    color: #c8b898; padding: 10px 40px; font-size: 15px;
    cursor: pointer; letter-spacing: 4px; font-family: inherit;
    transition: all 0.3s; border-radius: 2px;
  }
  #password-gate .gate-submit:hover { background: rgba(200,180,150,0.15); border-color: rgba(200,180,150,0.4); }

  /* ===== 背景装饰 ===== */
  #bg-deco {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    transition: opacity 1s ease, background 1.2s ease;
  }
  .bird {
    position: absolute; pointer-events: none;
    animation: birdFly 7s ease-in-out infinite;
    opacity: 0.55; transition: opacity 1s ease;
  }
  /* ===== 雨滴画布 ===== */
  #rain-canvas {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    opacity: 0; transition: opacity 1.2s ease;
  }
  #rain-canvas.active { opacity: 1; }

  @keyframes birdFly {
    0% { transform: translateX(0) translateY(0); }
    50% { transform: translateX(18px) translateY(-4px); }
    100% { transform: translateX(0) translateY(0); }
  }

  /* ===== 章节标题 ===== */
  .chapter-title {
    font-size: 18px; letter-spacing: 4px; text-align: center;
    color: var(--text2); font-weight: 400;
    padding-bottom: 14px; margin-bottom: 6px;
    border-bottom: 1px solid var(--border-color, rgba(0,0,0,0.06));
    transition: color 0.5s ease, border-color 0.5s ease;
  }

  /* ===== 段落 ===== */
  .paragraph {
    font-size: 16px; line-height: 1.85; letter-spacing: 1.2px;
    color: var(--text); margin-bottom: 2px;
    text-indent: 2em;
    transition: color 0.5s ease;
  }
  .paragraph strong { font-weight: 700; }
  .paragraph em { font-style: italic; opacity: 0.85; }
  .paragraph del { text-decoration: line-through; opacity: 0.35; font-size: 0.35em; line-height: 1.1; }
  .paragraph .small { font-size: 0.78em; opacity: 0.7; }
  .cute { font-family: "Courier New", "Consolas", "SimHei", monospace; font-size: 1.15em; font-weight: 700; letter-spacing: 2px; color: #1a1a1a; text-shadow: 1px 1px 0 rgba(0,0,0,0.1); image-rendering: pixelated; }
  .cite { font-family: "Ma Shan Zheng", "STXingkai", "华文行楷", "KaiTi", "楷体", "Noto Serif SC", serif; letter-spacing: 1px; white-space: nowrap; font-size: 1.1em; }

  /* 书信格式 */
  .salutation { text-indent: 0; }
  .centered { text-indent: 0; text-align: center; }
  .right { text-indent: 0; text-align: right; }
  .signature-top { text-indent: 0; text-align: right; padding-right: 3em; }
  .section-heading {
    text-indent: 0; text-align: center; font-weight: 700;
    padding-bottom: 14px; margin-bottom: 6px;
    border-bottom: 1px solid var(--border-color, rgba(0,0,0,0.06));
    transition: color 0.5s ease, border-color 0.5s ease;
  }
  .kaiti { font-family: "KaiTi", "STKaiti", "楷体", serif; font-style: normal; letter-spacing: 1px; }

  /* ===== 导航 ===== */
  #end-back-btn {
    position: fixed; top: 24px; left: 24px; z-index: 30;
    background: rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.08);
    color: #7a6a5a; padding: 8px 16px;
    font-size: 13px; letter-spacing: 2px; font-family: inherit;
    cursor: pointer; border-radius: 2px;
    transition: all 0.3s;
    display: none;
  }
  #end-back-btn:hover { background: rgba(0,0,0,0.08); color: #4a3a2a; }
  #end-back-btn.visible { display: flex; align-items: center; gap: 4px; }

  #nav-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 20px;
    background: linear-gradient(to top, var(--nav-bg, #f5f1e8) 60%, transparent);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    transition: background 1.2s ease;
  }
  .nav-btn {
    background: var(--card-bg, rgba(255,255,255,0.6));
    border: 1px solid var(--border-color, rgba(0,0,0,0.08));
    color: var(--text2, #6b6560); padding: 8px 18px;
    font-size: 13px; letter-spacing: 2px; font-family: inherit;
    cursor: pointer; border-radius: 2px;
    transition: all 0.3s; display: flex; align-items: center; gap: 6px;
  }
  .nav-btn:hover { color: var(--text, #3a3632); border-color: var(--border-hover, rgba(0,0,0,0.2)); }
  .nav-btn:disabled { opacity: 0.25; pointer-events: none; }
  /* 闪烁高亮提示 */
  #next-btn.glow-hint {
    animation: glowPulse 0.9s ease-in-out infinite;
    position: relative; overflow: hidden;
  }
  #next-btn.glow-hint::after {
    content: '';
    position: absolute; inset: 0;
    background: rgba(255,255,255,0.55);
    animation: whiteFlash 0.9s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes whiteFlash {
    0%, 100% { opacity: 0; }
    50% { opacity: 1; }
  }
  @keyframes glowPulse {
    0%, 100% { box-shadow: 0 0 0 rgba(255,255,255,0); }
    50% { box-shadow: 0 0 20px rgba(255,255,255,0.5), 0 0 36px rgba(255,255,255,0.2); }
  }
  #chapter-indicator {
    font-size: 12px; letter-spacing: 2px; color: var(--text2, #9a958e); text-align: center;
  }

  /* ===== 音乐栏 ===== */
  #music-bar {
    position: fixed; left: 0; top: 50%; transform: translateY(-50%); z-index: 50;
  }
  #music-tab {
    writing-mode: vertical-rl; letter-spacing: 2px;
    font-size: 11px; color: var(--text2, #9a958e); padding: 10px 5px;
    cursor: pointer; background: var(--card-bg, rgba(255,255,255,0.5));
    border: 1px solid var(--border-color, rgba(0,0,0,0.06)); border-left: none;
    border-radius: 0 4px 4px 0; transition: all 0.3s; font-family: inherit;
  }
  #music-tab:hover { color: var(--text, #5a5550); }
  #music-tab .note-icon { writing-mode: horizontal-tb; display: block; text-align: center; margin-bottom: 2px; }
  #music-panel {
    background: var(--card-bg, rgba(255,255,255,0.6));
    border: 1px solid var(--border-color, rgba(0,0,0,0.06));
    border-left: none; border-radius: 0 6px 6px 0;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    max-width: 0; overflow: hidden; transition: all 0.3s ease;
    padding: 0; border: none;
  }
  #music-panel.open {
    max-width: 180px; padding: 12px 8px;
    border: 1px solid var(--border-color, rgba(0,0,0,0.06)); border-left: none;
  }
  #music-btn {
    width: 26px; height: 26px; background: rgba(0,0,0,0.03);
    border: 1px solid rgba(0,0,0,0.1); border-radius: 50%;
    color: var(--text2, #6b6560); font-size: 11px; cursor: pointer; flex-shrink: 0;
    font-family: inherit; transition: all 0.3s;
  }
  #music-btn:hover { background: rgba(0,0,0,0.06); }
  #music-btn.paused { opacity: 0.4; }
  #music-btn.loading { opacity: 0.6; animation: music-pulse 0.8s ease-in-out infinite; }
  #music-btn.buffering { opacity: 0.7; animation: music-buf 0.5s ease-in-out infinite; }
  @keyframes music-pulse { 0%, 100% { opacity: 0.35; } 50% { opacity: 0.8; } }
  @keyframes music-buf { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.9; } }
  #volume-slider {
    -webkit-appearance: none; appearance: none;
    width: 70px; height: 2px; background: rgba(0,0,0,0.12);
    border-radius: 1px; outline: none; cursor: pointer;
    transform: rotate(-90deg); margin: 28px 0;
  }
  #volume-slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 10px; height: 10px;
    border-radius: 50%; background: #8b8b80; cursor: pointer;
  }
  #now-playing { font-size: 10px; color: var(--text2, #8a857e); letter-spacing: 1px; text-align: center; }

  @media (max-width: 600px) {
    #chapter-view { padding: 32px 16px 90px; }
    #chapter-inner { gap: 16px; padding: 0 24px; }
    .paragraph { font-size: 15px; line-height: 1.75; }
    .nav-btn { padding: 7px 13px; font-size: 12px; }
    .chapter-title { font-size: 16px; }
    #password-gate .gate-input { width: 160px; font-size: 16px; }
  }
</style>
</head>
<body>

<div id="play-overlay">
  <div class="play-hint">轻点任意处 开始阅读</div>
</div>

<div id="bg-deco">
  <svg class="bird" style="top:15%;left:55%;width:22px;height:10px;animation-delay:0s;" viewBox="0 0 22 10"><path d="M0 8 Q6 0 11 5 Q16 0 22 8" fill="none" stroke="rgba(0,0,0,0.45)" stroke-width="1.5"/></svg>
  <svg class="bird" style="top:21%;left:62%;width:16px;height:7px;animation-delay:1.2s;" viewBox="0 0 16 7"><path d="M0 5 Q5 0 8 4 Q11 0 16 5" fill="none" stroke="rgba(0,0,0,0.4)" stroke-width="1.2"/></svg>
  <svg class="bird" style="top:12%;left:70%;width:26px;height:12px;animation-delay:2.8s;" viewBox="0 0 26 12"><path d="M0 9 Q8 0 13 6 Q18 0 26 9" fill="none" stroke="rgba(0,0,0,0.5)" stroke-width="1.6"/></svg>
  <svg class="bird" style="top:25%;left:48%;width:14px;height:6px;animation-delay:4s;" viewBox="0 0 14 6"><path d="M0 4 Q4 0 7 3 Q10 0 14 4" fill="none" stroke="rgba(0,0,0,0.4)" stroke-width="1.1"/></svg>
  <svg class="bird" style="top:18%;left:78%;width:20px;height:9px;animation-delay:5.5s;" viewBox="0 0 20 9"><path d="M0 7 Q6 0 10 5 Q14 0 20 7" fill="none" stroke="rgba(0,0,0,0.45)" stroke-width="1.4"/></svg>
</div>

<canvas id="rain-canvas"></canvas>

<div id="chapter-view">
  <div id="chapter-inner"></div>
</div>

<!-- ===== 密码门 ===== -->
<div id="password-gate" class="hidden">
  <button class="gate-close" id="gate-close">✕</button>
  <div class="gate-icon">
    <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <g stroke="#c8b898" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none">
        <!-- 千纸鹤 -->
        <polygon points="24,4 38,20 30,36 24,30 18,36 10,20" opacity="0.8"/>
        <polyline points="24,30 24,44"/>
        <polyline points="18,44 24,38 30,44"/>
        <line x1="24" y1="20" x2="34" y2="14"/>
        <line x1="24" y1="20" x2="14" y2="14"/>
        <!-- 翅膀 -->
        <path d="M24,20 L34,14 Q28,10 24,12" opacity="0.6"/>
        <path d="M24,20 L14,14 Q20,10 24,12" opacity="0.6"/>
        <!-- 眼睛小点 -->
        <circle cx="22" cy="8" r="0.8" fill="#c8b898" opacity="0.6"/>
      </g>
    </svg>
  </div>
  <div class="gate-title">请输入密码</div>
  <input type="text" id="gate-word" class="gate-input" maxlength="20" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="输入密码">
  <div class="gate-hint">这些数字代表的是什么字母呢</div>
  <div class="gate-error" id="gate-error"></div>
  <button class="gate-submit" id="gate-submit">确 认</button>
</div>

<button id="end-back-btn">← 返回</button>

<div id="nav-bar">
  <button class="nav-btn" id="prev-btn" disabled>← 上一章</button>
  <span id="chapter-indicator"></span>
  <button class="nav-btn" id="next-btn">下一章 →</button>
</div>

<div id="music-bar">
  <div id="music-panel">
    <button id="music-btn">♫</button>
    <span id="now-playing"></span>
    <input type="range" id="volume-slider" min="0" max="100" value="30">
  </div>
  <div id="music-tab"><span class="note-icon">♫</span>音乐</div>
</div>

<script>
// ===== 章节数据 =====
// 真实章节：0-前言 1-信·序 2-童年 3-在人间 4-我的大学 5-结尾
// 密码门插在 1 和 2 之间（导航时自动处理）
const chapters = [
  {
    // 0: 前言
    title: "前言",
    theme: {
      bg: "#eae5da", text: "#3a3632", text2: "#8a8478",
      navBg: "#eae5da", cardBg: "rgba(255,255,255,0.45)",
      borderColor: "rgba(0,0,0,0.08)", borderHover: "rgba(0,0,0,0.2)"
    },
    music: "https://pub-062cd22d0ea64348a193ad666086c28f.r2.dev/music-preface.mp3",
    musicLabel: "conjoined (interlude)",
    content: [
      "很高兴妳能打开这封信",
      "这封信讲述了我是怎么喜欢上妳的，还有想和你说的话",
      "也解释了为什么过去的我表现非常奇怪",
      "简单说，这封信是一个中二少年盛大的意淫，是一篇恶心到极致的自白，是蠢到不行的一个个借口。因为我也向往<span class='cite'>《爱在黎明破晓前》</span>的那种心灵交流，所以我把我的过去大概的写下来了",
      "看与不看这封信，取决于妳",
      "<del>如果不看的话，请把它与附在上面的巧克力一起丢了吧</del>",
      "本来是想写给妳的，但这一篇实在不合适。所以不看的话可以直接关掉吧，而且这一篇的密码妳应该猜不到。想看的话就来问我吧，我真的很想和妳聊聊天<span class='cute'>QwQ</span>",
      "（不过我可以保证，这封信能看爽，是我很用心写的，很浪漫的东西，以及看了以后绝对不会后悔吧。啊还是不保证了，不过起码对于我来说是这样）",
      "如果要看的话，可以找个没人的地方，一边听着网页里的歌一边读这封信吗，因为这封信就是这样诞生的。",
      "那么，前言就这样吧。"
    ]
  },
  {
    // 1: 信·序
    title: "信 · 序",
    theme: {
      bg: "#2d2520", text: "#d4c8b8", text2: "#a09078",
      navBg: "#2d2520", cardBg: "rgba(38,32,28,0.7)",
      borderColor: "rgba(255,255,255,0.08)", borderHover: "rgba(255,255,255,0.2)",
      deco: "radial-gradient(ellipse at 80% 30%, rgba(220,160,100,0.18) 0%, rgba(200,130,80,0.08) 30%, transparent 60%), linear-gradient(180deg, rgba(180,140,100,0.06) 0%, rgba(200,150,100,0.1) 50%, rgba(180,120,80,0.04) 100%)",
      initialVolume: 15
    },
    music: "https://pub-062cd22d0ea64348a193ad666086c28f.r2.dev/LOST-BOY.mp3",
    musicLabel: "LOST BOY",
    content: [
      { h: "<strong>致出现在我青春的你：</strong>", c: "salutation" },
      { h: "<em>多情只有春庭月，犹为离人照落花</em>", c: "salutation kaiti" },
      { h: "<strong>我想，只要看到你笑着回眸，我就一定会喜欢上你</strong>", c: "centered" },
      { h: "2022年的夏天，没有鸟叫蝉鸣，只有教室里的空调发出持续不断的嗡鸣声，与同学们的说话声混在一起，变成一片模糊的白噪音。我托着下巴发呆，无意识地朝前望，恰好对上你回头时的微笑。这么多年过去，我已经忘记那天老师讲了什么，忘记了天气，忘记了周围坐着谁。唯独记得那个瞬间，如果一定要形容的话，我想，阿尔芒第一次见到玛格丽特时，大概也是这样的感觉。", c: "kaiti" },
      { h: "我用了一个现在想起来十分蹩脚的理由要到了你的联系方式。那个下午，我开心得像是得到了一件珍贵的礼物。", c: "kaiti" },
      { h: "真希望生活是一道封闭的公式，我只需要把它记下，把未来算出来就好了。", c: "kaiti" },
      { h: "可惜呀，人生从来不是一道能够推导结果的公式。它更像一个不断变化的函数，我们从来都不是等号的另一端，只是过程里的某个变量。", c: "kaiti" }
    ]
  },
  {
    // 2: 童年
    title: "童年",
    hideTitle: true,
    theme: {
      bg: "#352820",  // 初始暗暖（不超过信·序的 #2d2520）
      text: "#c4cfd8", text2: "#8a98a4",
      navBg: "#1a2228", cardBg: "rgba(26,34,40,0.8)",
      borderColor: "rgba(255,255,255,0.14)", borderHover: "rgba(255,255,255,0.25)",
      deco: "radial-gradient(ellipse at 50% 15%, rgba(200,150,100,0.12) 0%, rgba(160,110,70,0.05) 25%, transparent 50%)",
      scrollBg: true,
      scrollRain: true,

// ===== 雨滴动画 + 滚动驱动 + 雨声 =====
(function() {
  const canvas = document.getElementById('rain-canvas');
  const ctx = canvas.getContext('2d');
  let drops = [];
  let w = 0, h = 0;
  let currentOpacity = 0, targetOpacity = 0;
  let currentMoon = 0, targetMoon = 0;
  let currentSun = 0, targetSun = 0;
  let animId = null;
  let scrollChapter = false;

  // ===== 雨声（Web Audio 白噪音 → 沙沙小雨） =====
  let audioCtx = null;
  let rainGain = null;
  let rainNoise1 = null;
  let rainNoise2 = null;

  function initRainSound() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const sampleRate = audioCtx.sampleRate;
    const duration = 3;

    // 生成两段不相关的噪音
    function makeNoiseBuffer() {
      const buf = audioCtx.createBuffer(1, sampleRate * duration, sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
      return buf;
    }

    // 主雨声线：带通 + 高切 → 沙沙的中频
    const bp1 = audioCtx.createBiquadFilter();
    bp1.type = 'bandpass';
    bp1.frequency.value = 1800;
    bp1.Q.value = 0.6;

    const hs1 = audioCtx.createBiquadFilter();
    hs1.type = 'highshelf';
    hs1.frequency.value = 4000;
    hs1.gain.value = -12;

    const g1 = audioCtx.createGain();
    g1.gain.value = 0.55;

    rainNoise1 = audioCtx.createBufferSource();
    rainNoise1.buffer = makeNoiseBuffer();
    rainNoise1.loop = true;
    rainNoise1.connect(bp1);
    bp1.connect(hs1);
    hs1.connect(g1);

    // 辅助层：更低频的底噪 → 雨的厚度
    const bp2 = audioCtx.createBiquadFilter();
    bp2.type = 'bandpass';
    bp2.frequency.value = 600;
    bp2.Q.value = 0.4;

    const g2 = audioCtx.createGain();
    g2.gain.value = 0.35;

    rainNoise2 = audioCtx.createBufferSource();
    rainNoise2.buffer = makeNoiseBuffer();
    rainNoise2.loop = true;
    rainNoise2.connect(bp2);
    bp2.connect(g2);

    // 合并 → 总音量
    rainGain = audioCtx.createGain();
    rainGain.gain.value = 0;
    g1.connect(rainGain);
    g2.connect(rainGain);
    rainGain.connect(audioCtx.destination);

    rainNoise1.start();
    rainNoise2.start();
  }

  function setRainVolume(vol) {
    if (rainGain) {
      rainGain.gain.setTargetAtTime(vol * 0.045, audioCtx.currentTime, 0.5);
    }
  }

  function killRainSound() {
    [rainNoise1, rainNoise2].forEach(n => {
      if (n) { try { n.stop(); } catch(e) {} n.disconnect(); }
    });
    rainNoise1 = null;
    rainNoise2 = null;
    if (rainGain) { rainGain.disconnect(); rainGain = null; }
    if (audioCtx) { audioCtx.close(); audioCtx = null; }
  }

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }

  function spawnDrop() {
    return {
      x: Math.random() * w * 1.3 - w * 0.15,
      y: Math.random() * -h,
      len: Math.random() * 14 + 6,
      speed: Math.random() * 9 + 6,
      opacity: Math.random() * 0.25 + 0.08,
      wind: Math.random() * 0.4 + 0.1
    };
  }

  function initDrops() {
    const count = Math.floor(w * h / 1800);
    drops = [];
    for (let i = 0; i < count; i++) {
      const d = spawnDrop();
      d.y = Math.random() * h;
      drops.push(d);
    }
  }

  // 颜色插值
  function lerpColor(c1, c2, t) {
    const r1 = parseInt(c1.slice(1,3), 16), g1 = parseInt(c1.slice(3,5), 16), b1 = parseInt(c1.slice(5,7), 16);
    const r2 = parseInt(c2.slice(1,3), 16), g2 = parseInt(c2.slice(3,5), 16), b2 = parseInt(c2.slice(5,7), 16);
    const r = Math.round(r1 + (r2 - r1) * t);
    const g = Math.round(g1 + (g2 - g1) * t);
    const b = Math.round(b1 + (b2 - b1) * t);
    return '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join('');
  }

  function getScrollBg() {
    const pct = getScrollPct();
    const stops = cfg ? cfg.stops : [{ at:0, color:'#1a2228' }, { at:1, color:'#111820' }];
    for (let i = 0; i < stops.length - 1; i++) {
      if (pct <= stops[i+1].at) {
        const t = (pct - stops[i].at) / (stops[i+1].at - stops[i].at);
        return lerpColor(stops[i].color, stops[i+1].color, t);
      }
    }
    return stops[stops.length-1].color;
  }

  function getRainTarget() {
    if (!cfg || cfg.rainStart === undefined) return 0;
    const pct = getScrollPct();
    const rs = cfg.rainStart, re = cfg.rainEnd;
    if (cfg.rainFadeOut) {
      // 雨从有到无
      if (pct < rs) return 1;
      if (pct > re) return 0;
      return 1 - (pct - rs) / (re - rs);
    } else {
      // 雨从无到有
      if (pct < rs) return 0;
      if (pct > re) return 1;
      return (pct - rs) / (re - rs);
    }
  }

  function getSunTarget() {
    if (!cfg || !cfg.sunStart) return 0;
    const pct = getScrollPct();
    if (pct < cfg.sunStart) return 0;
    if (pct > cfg.sunEnd) return 1;
    return (pct - cfg.sunStart) / (cfg.sunEnd - cfg.sunStart);
  }

  function getMoonTarget() {
    if (!cfg || !cfg.moonStart) return 0;
    const pct = getScrollPct();
    if (pct < cfg.moonStart) return 0;
    if (pct > cfg.moonEnd) return 1;
    return (pct - cfg.moonStart) / (cfg.moonEnd - cfg.moonStart);
  }

  function getScrollPct() {
    const docH = document.documentElement.scrollHeight - window.innerHeight;
    if (docH <= 0) return 0;
    return Math.min(1, Math.max(0, window.scrollY / docH));
  }

  function onScroll() {
    if (!scrollChapter) return;
    const pct = getScrollPct();
    const bg = getScrollBg();
    document.body.style.background = bg;
    document.getElementById('nav-bar').style.setProperty('--nav-bg', bg);

    // 按钮颜色从背景色衍生，与背景同步变色
    const hex = bg.replace('#','');
    const bg_r = parseInt(hex.slice(0,2), 16);
    const bg_g = parseInt(hex.slice(2,4), 16);
    const bg_b = parseInt(hex.slice(4,6), 16);
    // UI 底色：暗底亮钮 → 亮底暗钮
    const textLum = (bg_r + bg_g + bg_b) / 3;
    const isBright = textLum > 110;
    // 正文颜色
    document.documentElement.style.setProperty('--text', isBright ? '#3a3028' : '#c8d0d8');
    // UI 按钮
    const uiBg = isBright
      ? `rgba(0,0,0,0.05)`
      : `rgba(${bg_r},${bg_g},${bg_b},0.5)`;
    const uiText = isBright ? '#5a4838' : (textLum < 60 ? '#8898a8' : '#8a8478');
    const uiBorder = isBright
      ? 'rgba(0,0,0,0.14)'
      : (textLum < 60
        ? `rgba(${Math.min(255,bg_r+50)},${Math.min(255,bg_g+50)},${Math.min(255,bg_b+50)},0.2)`
        : 'rgba(0,0,0,0.08)');

    document.documentElement.style.setProperty('--card-bg', uiBg);
    document.documentElement.style.setProperty('--text2', uiText);
    document.documentElement.style.setProperty('--border-color', uiBorder);
    document.querySelectorAll('.nav-btn, #music-tab, #music-panel').forEach(el => {
      el.style.background = uiBg;
      el.style.color = uiText;
      el.style.borderColor = uiBorder;
    });

    // 鸟随滚动渐隐（有 hideBirds 的章节直接隐藏）
    if (cfg && cfg.hideBirds) {
      document.querySelectorAll('.bird').forEach(b => { b.style.opacity = '0'; });
    } else {
      const birdOpacity = Math.max(0, 1 - pct * 2.2);
      document.querySelectorAll('.bird').forEach(b => { b.style.opacity = birdOpacity; });
    }
    // 暖光随滚动消失（有 deco 才调）
    if (bgDeco.style.background && bgDeco.style.background !== '') {
      bgDeco.style.opacity = Math.max(0, 1 - pct * 1.8);
    }

    targetOpacity = getRainTarget();
    targetMoon = getMoonTarget();
    targetSun = getSunTarget();
  }

  function draw() {
    // 平滑过渡 rain & moon opacity
    const step = 0.02;
    if (Math.abs(currentOpacity - targetOpacity) > step) {
      currentOpacity += targetOpacity > currentOpacity ? step : -step;
    } else { currentOpacity = targetOpacity; }
    if (Math.abs(currentMoon - targetMoon) > step) {
      currentMoon += targetMoon > currentMoon ? step : -step;
    } else { currentMoon = targetMoon; }
    if (Math.abs(currentSun - targetSun) > step) {
      currentSun += targetSun > currentSun ? step : -step;
    } else { currentSun = targetSun; }

    canvas.style.opacity = Math.max(currentOpacity, currentMoon * 0.3, currentSun * 0.2);
    setRainVolume(currentOpacity);

    const needDraw = currentOpacity > 0.002 || currentMoon > 0.002 || currentSun > 0.002;
    if (!needDraw) { animId = requestAnimationFrame(draw); return; }

    ctx.clearRect(0, 0, w, h);

    // 月亮
    if (currentMoon > 0.005) {
      const mx = w * 0.72, my = h * 0.12, mr = Math.min(w, h) * 0.09;
      // 月光——从右上方斜向左下方
      for (let i = 2; i >= 0; i--) {
        const alpha = [0.08, 0.14, 0.22][i] * currentMoon;
        const rx = mr * [4, 2.5, 1.3][i], ry = mr * [3.5, 2.2, 1.1][i];
        const ox = mx - mr * [2.2, 1.2, 0.3][i]; // 向左延伸
        const oy = my + mr * [1.8, 0.9, 0.3][i]; // 向下延伸
        const grad = ctx.createRadialGradient(mx, my, mr * 0.3, ox, oy, rx);
        grad.addColorStop(0, `rgba(255,245,230,${alpha * 1.4})`);
        grad.addColorStop(1, 'rgba(255,235,210,0)');
        ctx.beginPath();
        ctx.ellipse(ox, oy, rx, ry, -0.7, 0, Math.PI * 2); // 斜向左下
        ctx.fillStyle = grad;
        ctx.fill();
      }
      // 月亮本体
      const bodyGrad = ctx.createRadialGradient(mx - mr*0.15, my - mr*0.15, mr*0.05, mx, my, mr);
      bodyGrad.addColorStop(0, `rgba(255,254,248,${currentMoon})`);
      bodyGrad.addColorStop(0.6, `rgba(250,240,220,${currentMoon * 0.9})`);
      bodyGrad.addColorStop(1, `rgba(230,210,185,${currentMoon * 0.65})`);
      ctx.beginPath();
      ctx.arc(mx, my, mr, 0, Math.PI * 2);
      ctx.fillStyle = bodyGrad;
      ctx.fill();
    }

    // 太阳
    if (currentSun > 0.005) {
      const sx = w * 0.08, sy = h * (0.12 - currentSun * 0.05);
      const sr = Math.min(w, h) * 0.08;
      // 外层光晕——偏向右下
      for (let i = 3; i >= 0; i--) {
        const alpha = [0.03, 0.06, 0.11, 0.18][i] * currentSun;
        const r = sr * [6, 4, 2.2, 1.3][i];
        const ox = sx + sr * [1.8, 1.0, 0.3, 0.1][i];
        const oy = sy + sr * [1.5, 0.8, 0.3, 0.1][i];
        const grad = ctx.createRadialGradient(sx, sy, sr * 0.2, ox, oy, r);
        grad.addColorStop(0, `rgba(255,240,200,${alpha * 1.5})`);
        grad.addColorStop(0.5, `rgba(255,210,140,${alpha * 0.6})`);
        grad.addColorStop(1, 'rgba(255,180,100,0)');
        ctx.beginPath();
        ctx.arc(sx, sy, r, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();
      }
      // 太阳本体
      const sunGrad = ctx.createRadialGradient(sx - sr*0.08, sy - sr*0.08, sr*0.02, sx, sy, sr);
      sunGrad.addColorStop(0, `rgba(255,254,248,${currentSun})`);
      sunGrad.addColorStop(0.3, `rgba(255,240,200,${currentSun})`);
      sunGrad.addColorStop(0.7, `rgba(255,180,80,${currentSun * 0.8})`);
      sunGrad.addColorStop(1, `rgba(255,140,40,${currentSun * 0.3})`);
      ctx.beginPath();
      ctx.arc(sx, sy, sr, 0, Math.PI * 2);
      ctx.fillStyle = sunGrad;
      ctx.fill();
    }

    // 雨滴
    for (const d of drops) {
      ctx.beginPath();
      ctx.moveTo(d.x, d.y);
      ctx.lineTo(d.x - d.wind * 2, d.y + d.len);
      ctx.strokeStyle = `rgba(180,195,210,${d.opacity})`;
      ctx.lineWidth = 0.6;
      ctx.lineCap = 'round';
      ctx.stroke();
      d.y += d.speed;
      d.x += d.wind;
      if (d.y > h + 20) {
        d.y = -(d.len + Math.random() * 60);
        d.x = Math.random() * w * 1.3 - w * 0.15;
      }
    }
    animId = requestAnimationFrame(draw);
  }

  window._rainControl = {
    enable(chapterCfg) {
      cfg = chapterCfg || null;
      scrollChapter = true;
      document.body.style.transition = 'none';
      resize();
      initDrops();
      currentOpacity = 0; targetOpacity = 0;
      currentMoon = 0; targetMoon = 0;
      currentSun = 0; targetSun = 0;
      canvas.style.opacity = '0';
      initRainSound();
      onScroll();
      draw();
    },
    disable() {
      cfg = null;
      scrollChapter = false;
      document.body.style.transition = '';
      currentOpacity = 0; targetOpacity = 0;
      currentMoon = 0; targetMoon = 0;
      currentSun = 0; targetSun = 0;
      canvas.style.opacity = '0';
      setRainVolume(0);
      killRainSound();
      // 鸟由 applyTheme 恢复
    },
    resize
  };

  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', () => { resize(); initDrops(); });
})();

// ===== 音频预加载缓存（Blob URL）=====
const audioCache = new Map();
const audioFetching = new Map();

async function fetchAudioBlob(src) {
  if (audioCache.has(src)) return audioCache.get(src).blobUrl;
  if (audioFetching.has(src)) return audioFetching.get(src);
  const p = fetch(src).then(r => {
    if (!r.ok) throw new Error('fetch failed');
    return r.blob();
  }).then(blob => {
    const blobUrl = URL.createObjectURL(blob);
    audioCache.set(src, { blobUrl, blob });
    audioFetching.delete(src);
    return blobUrl;
  }).catch(e => {
    audioFetching.delete(src);
    throw e;
  });
  audioFetching.set(src, p);
  return p;
}

function preloadChapterAudio(index) {
  const ch = chapters[index];
  if (!ch || !ch.music) return;
  fetchAudioBlob(ch.music).catch(() => {});
}

window.addEventListener('beforeunload', () => {
  audioCache.forEach(({ blobUrl }) => URL.revokeObjectURL(blobUrl));
  audioCache.clear();
  audioFetching.clear();
});

// ===== 音乐切换（交叉淡入淡出）=====
function fadeToMusic(src, ch, callback) {
  if (musicTimeoutId) { clearTimeout(musicTimeoutId); musicTimeoutId = null; }
  clearInterval(musicFadeTimer);
  musicLoadId++;
  const thisLoadId = musicLoadId;

  // 渐弱旧音乐
  if (currentAudio && !currentAudio.paused) {
    const old = currentAudio;
    currentAudio = null;
    let vol = old.volume;
    const fadeStep = Math.max(vol / 18, 0.01);
    musicFadeTimer = setInterval(() => {
      if (thisLoadId !== musicLoadId) {
        clearInterval(musicFadeTimer);
        old.pause(); old.src = '';
        return;
      }
      vol = Math.max(0, vol - fadeStep);
      old.volume = vol;
      if (vol <= 0) {
        clearInterval(musicFadeTimer);
        old.pause(); old.src = '';
      }
    }, 40);
  } else if (currentAudio) {
    currentAudio.pause();
    currentAudio.src = '';
    currentAudio = null;
  }

  if (!src) { currentAudio = null; if (callback) callback(); return; }

  // 优先用缓存 Blob
  const cached = audioCache.get(src);
  const audioSrc = cached ? cached.blobUrl : src;

  const a = new Audio(audioSrc);
  a.loop = true; a.volume = 0;
  a.preload = 'auto';

  const doPlay = () => {
    if (thisLoadId !== musicLoadId) { a.pause(); a.src = ''; return; }
    musicTimeoutId = null;
    a.play().catch(() => {});
    currentAudio = a;
    musicBtn.classList.remove('loading', 'buffering');
    let v = 0;
    const target = volumeSlider.value / 100;
    const step = Math.max(target / 30, 0.005);
    const fadeIn = setInterval(() => {
      if (thisLoadId !== musicLoadId) { clearInterval(fadeIn); return; }
      v = Math.min(target, v + step);
      a.volume = v;
      if (v >= target) { clearInterval(fadeIn); musicBtn.classList.remove('paused'); if (callback) callback(); }
    }, 50);
  };

  // canplay 就开播（快）
  let canplayFallback = null;
  let started = false;
  const onReady = () => {
    if (thisLoadId !== musicLoadId) { a.pause(); a.src = ''; return; }
    if (started) return;
    started = true;
    doPlay();
  };
  a.addEventListener('canplay', onReady, { once: true });
  canplayFallback = setTimeout(() => { if (!started) onReady(); }, 10000);

  // 中途缓冲
  let startedPlaying = false;
  a.addEventListener('waiting', () => {
    if (thisLoadId !== musicLoadId) return;
    if (startedPlaying) musicBtn.classList.add('buffering');
  });
  a.addEventListener('playing', () => {
    if (thisLoadId !== musicLoadId) return;
    startedPlaying = true;
    musicBtn.classList.remove('buffering');
  });
  a.addEventListener('suspend', () => {
    if (thisLoadId !== musicLoadId) return;
    musicBtn.classList.remove('buffering');
  });

  a.addEventListener('error', () => {
    if (thisLoadId !== musicLoadId) return;
    clearTimeout(canplayFallback);
    musicBtn.classList.remove('loading', 'buffering');
    musicBtn.classList.add('paused');
    console.warn('音乐加载失败:', src);
    currentAudio = null;
    if (callback) callback();
  }, { once: true });

  if (!cached) musicBtn.classList.add('loading');
  a.src = audioSrc;
  a.load();

  // 后台预下载 Blob
  if (!cached) { fetchAudioBlob(src).catch(() => {}); }
}

// ===== 密码门 =====
function showPasswordGate() {
  if (currentAudio && !currentAudio.paused) {
    let vol = currentAudio.volume;
    const step = vol / 20;
    const fadeOut = setInterval(() => {
      vol = Math.max(0, vol - step);
      currentAudio.volume = vol;
      if (vol <= 0) { clearInterval(fadeOut); currentAudio.pause(); musicBtn.classList.add('paused'); }
    }, 50);
    currentAudio = null;
  }
  passwordGate.classList.remove('hidden');
  gateWord.value = '';
  gateError.style.opacity = '0';
  setTimeout(() => gateWord.focus(), 300);
}

function hidePasswordGate() {
  passwordGate.classList.add('hidden');
}

gateWord.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') checkPassword();
});

gateSubmit.addEventListener('click', checkPassword);
gateClose.addEventListener('click', () => {
  hidePasswordGate();
  renderChapter(1);
});

function checkPassword() {
  if (gateWord.value.trim().toLowerCase() === CORRECT_PASSWORD) {
    passwordUnlocked = true;
    gateError.style.opacity = '0';
    hidePasswordGate();
    renderChapter(2);
  } else {
    gateError.textContent = '不对哦，再想想';
    gateError.style.opacity = '1';
    gateWord.value = '';
    gateWord.focus();
  }
}

// ===== 渲染章节 =====
function renderChapter(index) {
  const ch = chapters[index];
  applyTheme(ch.theme);
  currentChapter = index;

  if (initialRender) {
    // 首次渲染：直接显示，不加动画
    initialRender = false;
    chapterInner.innerHTML =
      (ch.hideTitle ? '' : '<div class="chapter-title">' + ch.title + '</div>') +
      ch.content.map(p => {
        if (typeof p === 'string') return '<p class="paragraph">' + p + '</p>';
        return '<p class="paragraph' + (p.c ? ' ' + p.c : '') + '">' + p.h + '</p>';
      }).join('');
    window.scrollTo({ top: 0 });
  } else {
    // 后续切换：先滚回顶部 → 淡出 → 替换内容 → 淡入
    window.scrollTo({ top: 0, behavior: 'instant' });
    chapterView.classList.add('fade-out');
    setTimeout(() => {
      chapterInner.innerHTML =
        (ch.hideTitle ? '' : '<div class="chapter-title">' + ch.title + '</div>') +
        ch.content.map(p => {
          if (typeof p === 'string') return '<p class="paragraph">' + p + '</p>';
          return '<p class="paragraph' + (p.c ? ' ' + p.c : '') + '">' + p.h + '</p>';
        }).join('');
      chapterView.classList.remove('fade-out');
    }, 300);
  }
  // 紧凑排版
  chapterInner.style.gap = ch.theme.compact ? '8px' : '';

  // 隐藏导航栏（结尾页）
  if (ch.theme.hideNav) {
    navBar.style.display = 'none';
    endBackBtn.classList.add('visible');
  } else {
    navBar.style.display = '';
    endBackBtn.classList.remove('visible');
    const total = chapters.length - 1;
    prevBtn.disabled = (index === 0);
    nextBtn.disabled = (index >= total);
    chapterIndicator.textContent = Math.min(index + 1, total) + ' / ' + total;
  }

  // 章节指定初始音量
  if (ch.theme.initialVolume !== undefined) {
    volumeSlider.value = ch.theme.initialVolume;
    if (currentAudio) currentAudio.volume = ch.theme.initialVolume / 100;
  }

  fadeToMusic(ch.music, ch);
  nowPlaying.textContent = ch.musicLabel;
  nextBtn.classList.remove('glow-hint');
  glowHintShown = false;

  // 预加载相邻章节音频
  if (index + 1 < chapters.length) preloadChapterAudio(index + 1);
  if (index - 1 >= 0) preloadChapterAudio(index - 1);
}

// ===== 导航 =====
function goNext() {
  if (currentChapter === 1 && !passwordUnlocked) {
    // 在序章点击下一章 → 显示密码门
    showPasswordGate();
    return;
  }
  if (currentChapter < chapters.length - 1) {
    renderChapter(currentChapter + 1);
  }
}

function goPrev() {
  if (currentChapter > 0) {
    renderChapter(currentChapter - 1);
  }
}

prevBtn.addEventListener('click', goPrev);
nextBtn.addEventListener('click', goNext);
endBackBtn.addEventListener('click', () => renderChapter(chapters.length - 2)); // 回到我的大学

// ===== 音乐栏 =====
musicTab.addEventListener('click', () => musicPanel.classList.toggle('open'));

musicBtn.addEventListener('click', () => {
  if (!currentAudio) return;
  if (currentAudio.paused) {
    currentAudio.play().then(() => musicBtn.classList.remove('paused')).catch(() => {});
  } else {
    currentAudio.pause(); musicBtn.classList.add('paused');
  }
});

volumeSlider.addEventListener('input', function() {
  if (currentAudio) currentAudio.volume = this.value / 100;
});

// ===== 我的大学滚动到底 → 闪烁提示 =====
let glowHintShown = false;
window.addEventListener('scroll', function() {
  if (currentChapter !== 4) {
    if (nextBtn.classList.contains('glow-hint')) {
      nextBtn.classList.remove('glow-hint');
      glowHintShown = false;
    }
    return;
  }
  const scrollBottom = document.documentElement.scrollHeight - window.innerHeight - window.scrollY;
  if (scrollBottom < 120 && !glowHintShown) {
    nextBtn.classList.add('glow-hint');
    glowHintShown = true;
  } else if (scrollBottom >= 120 && glowHintShown) {
    nextBtn.classList.remove('glow-hint');
    glowHintShown = false;
  }
}, { passive: true });

// ===== 初始化 =====
renderChapter(0);

// 遮罩点击 → 开始播放音乐
const playOverlay = document.getElementById('play-overlay');
playOverlay.addEventListener('click', function startMusic() {
  playOverlay.classList.add('hidden');
  const ch = chapters[currentChapter];
  if (ch.music && currentAudio && currentAudio.paused) {
    currentAudio.play().then(() => musicBtn.classList.remove('paused')).catch(() => {});
  } else if (ch.music && !currentAudio) {
    fadeToMusic(ch.music, ch);
  }
}, { once: true });

// 首次提示：展开音乐面板
setTimeout(() => musicPanel.classList.add('open'), 400);
setTimeout(() => musicPanel.classList.remove('open'), 2500);
</script>
